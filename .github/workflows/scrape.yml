name: Daglig konkurrentovervågning

on:
  schedule:
    # Kører hver dag kl. 07:00 UTC = 08:00 dansk vintertid (CET)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Tillader manuel kørsel fra GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Henter historik til trend-data

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer afhængigheder
        run: |
          pip install playwright beautifulsoup4 pandas feedparser
          playwright install chromium
          playwright install-deps chromium

      - name: Test RSS-feeds (debug)
        run: |
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, 'agent')
          from urllib.request import urlopen, Request
          from urllib.error import URLError
          import xml.etree.ElementTree as ET

          feeds = [
              ("Computerworld", "https://www.computerworld.dk/rss"),
              ("Version2",      "https://www.version2.dk/rss"),
              ("Finans",        "https://finans.dk/rss"),
              ("Børsen",        "https://borsen.dk/rss"),
              ("TV2 Business",  "https://nyheder.tv2.dk/rss?category=business"),
              ("Google News",   "https://news.google.com/rss/search?q=Telenor+Danmark&hl=da&gl=DK&ceid=DK:da"),
          ]
          for name, url in feeds:
              try:
                  req  = Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  resp = urlopen(req, timeout=10)
                  root = ET.fromstring(resp.read())
                  items = root.findall(".//item")
                  first = items[0].findtext("title","")[:60] if items else "-"
                  print(f"  OK  {name}: {len(items)} artikler  |  '{first}'")
              except Exception as e:
                  print(f"  ERR {name}: {e}")
          EOF

      - name: Kør scraper
        run: python3 agent/run.py

      - name: Vis agent log (debug)
        if: always()
        run: cat agent.log 2>/dev/null || echo "(ingen agent.log)"

      - name: Kopiér dashboard til docs/ (GitHub Pages)
        run: |
          mkdir -p docs
          # Kopier nyeste HTML-fil og slet ældre versioner så glob aldrig fejler
          LATEST=$(ls -t "Claude Outputs/"*.html | head -1)
          cp "$LATEST" docs/index.html
          # Behold kun den nyeste fil i Claude Outputs/
          ls -t "Claude Outputs/"*.html | tail -n +2 | xargs -r -d '\n' rm

      - name: Commit og push resultater
        run: |
          git config user.name "MarketIntel Bot"
          git config user.email "actions@github.com"
          git add "Claude Outputs/" data/ docs/ agent.log
          git diff --staged --quiet || git commit -m "Uge $(date +%V) $(date +%Y) — automatisk scrape [skip ci]"
          git push
