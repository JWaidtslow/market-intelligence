name: Ugentlig konkurrentovervågning

on:
  schedule:
    # Kører hver onsdag kl. 07:00 UTC = 08:00 dansk vintertid (CET)
    # Skift til 06:00 UTC i sommertid (CEST) hvis ønsket
    - cron: '0 7 * * 3'
  workflow_dispatch:  # Tillader manuel kørsel fra GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Henter historik til trend-data

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer afhængigheder
        run: |
          pip install playwright beautifulsoup4 pandas
          playwright install chromium
          playwright install-deps chromium

      - name: Kør scraper
        run: python3 agent/run.py

      - name: Kopiér dashboard til docs/ (GitHub Pages)
        run: |
          mkdir -p docs
          # Kopiér seneste dashboard som index.html så URL'en er fast
          cp "Claude Outputs/"*.html docs/index.html

      - name: Commit og push resultater
        run: |
          git config user.name "MarketIntel Bot"
          git config user.email "actions@github.com"
          git add "Claude Outputs/" data/ docs/
          # Commit kun hvis der er ændringer
          git diff --staged --quiet || git commit -m "Uge $(date +%V) $(date +%Y) — automatisk scrape [skip ci]"
          git push
